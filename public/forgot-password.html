<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lupa Password – Bonah Server</title>
  <link rel="icon" type="image/png" href="/image%20(7).png">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
  <link rel="stylesheet" href="themes.css">
  <link rel="stylesheet" href="auth.css">
<script>(function(){var t=(JSON.parse(localStorage.getItem("bonah_user")||"{}")||{}).theme||localStorage.getItem("bonah_theme")||"bonah";document.documentElement.setAttribute("data-theme",t);})()</script>
</head>
<body>
  <div class="auth-wrap">
    <div class="auth-brand">
      <div class="logo">🦋</div>
      <h1>Bonah Server</h1>
      <p>Bonah Server</p>
    </div>
    <div class="auth-card">
      <h2 class="auth-title">Lupa password? 🌙</h2>
      <p class="auth-sub">Masukkan emailmu dan kami akan mengirimkan link untuk mereset password.</p>

      <div class="alert err" id="alertErr"></div>
      <div class="alert ok" id="alertOk"></div>

      <form id="fpForm">
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="email" placeholder="email@kamu.com" required>
        </div>
        <button type="submit" class="btn-primary" id="submitBtn">Kirim Link Reset</button>
      </form>

      <div class="auth-link"><a href="login.html">← Kembali ke Login</a></div>
    </div>
  </div>

  <script>
    document.getElementById('fpForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('submitBtn');
      const errEl = document.getElementById('alertErr');
      const okEl = document.getElementById('alertOk');
      errEl.classList.remove('show');
      okEl.classList.remove('show');

      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span>Mengirim...';

      try {
        const res = await fetch('/api/auth/forgot-password', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email: document.getElementById('email').value.trim() })
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.message);
        okEl.textContent = data.message;
        okEl.classList.add('show');
        btn.textContent = 'Terkirim ✓';
      } catch (err) {
        errEl.textContent = err.message;
        errEl.classList.add('show');
        btn.disabled = false;
        btn.textContent = 'Kirim Link Reset';
      }
    });
  </script>
</body>
</html>
