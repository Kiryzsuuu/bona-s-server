<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Reset Password – Bonah Server</title>
  <link rel="icon" type="image/png" href="/image%20(7).png">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
  <link rel="stylesheet" href="themes.css">
  <link rel="stylesheet" href="auth.css">
<script>(function(){var t=(JSON.parse(localStorage.getItem("bonah_user")||"{}")||{}).theme||localStorage.getItem("bonah_theme")||"bonah";document.documentElement.setAttribute("data-theme",t);})()</script>
</head>
<body>
  <div class="auth-wrap">
    <div class="auth-brand">
      <div class="logo">🦋</div>
      <h1>Bonah Server</h1>
      <p>Bonah Server</p>
    </div>
    <div class="auth-card">
      <h2 class="auth-title">Buat password baru 🔑</h2>
      <p class="auth-sub">Masukkan password baru untuk akunmu.</p>

      <div class="alert err" id="alertErr"></div>
      <div class="alert ok" id="alertOk"></div>

      <div id="invalidToken" style="display:none;text-align:center;padding:20px 0;">
        <p style="color:#B94A4A;font-size:14px;margin-bottom:16px;">Link reset tidak valid atau sudah kadaluarsa 😢</p>
        <a href="forgot-password.html" class="btn-primary" style="display:inline-block;text-decoration:none;padding:10px 24px;">
          Minta Link Baru
        </a>
      </div>

      <form id="rpForm">
        <div class="form-group">
          <label>Password Baru</label>
          <div class="inp-icon-wrap">
            <input type="password" id="password" placeholder="Min. 6 karakter" required minlength="6">
            <i class="ti ti-eye eye" id="eyeBtn" onclick="toggleEye()"></i>
          </div>
        </div>
        <div class="form-group">
          <label>Konfirmasi Password</label>
          <input type="password" id="confirm" placeholder="Ulangi password baru" required>
        </div>
        <button type="submit" class="btn-primary" id="submitBtn">Simpan Password</button>
      </form>

      <div class="auth-link"><a href="login.html">← Kembali ke Login</a></div>
    </div>
  </div>

  <script>
    const token = new URLSearchParams(window.location.search).get('token');
    if (!token) {
      document.getElementById('rpForm').style.display = 'none';
      document.getElementById('invalidToken').style.display = 'block';
    }

    function toggleEye() {
      const inp = document.getElementById('password');
      const eye = document.getElementById('eyeBtn');
      inp.type = inp.type === 'password' ? 'text' : 'password';
      eye.className = inp.type === 'password' ? 'ti ti-eye eye' : 'ti ti-eye-off eye';
    }

    document.getElementById('rpForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('submitBtn');
      const errEl = document.getElementById('alertErr');
      const okEl = document.getElementById('alertOk');
      errEl.classList.remove('show');
      okEl.classList.remove('show');

      const password = document.getElementById('password').value;
      const confirm = document.getElementById('confirm').value;
      if (password !== confirm) {
        errEl.textContent = 'Password dan konfirmasi tidak cocok';
        errEl.classList.add('show');
        return;
      }

      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span>Menyimpan...';

      try {
        const res = await fetch('/api/auth/reset-password', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ token, password })
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.message);
        okEl.textContent = data.message;
        okEl.classList.add('show');
        document.getElementById('rpForm').style.display = 'none';
        setTimeout(() => { window.location.replace('login.html'); }, 2000);
      } catch (err) {
        errEl.textContent = err.message;
        errEl.classList.add('show');
        btn.disabled = false;
        btn.textContent = 'Simpan Password';
      }
    });
  </script>
</body>
</html>
